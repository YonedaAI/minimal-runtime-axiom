<svg width="1200" height="630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0e17"/>
      <stop offset="100%" style="stop-color:#141922"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#f97316"/>
      <stop offset="100%" style="stop-color:#ef4444"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect x="80" y="60" width="100" height="4" rx="2" fill="url(#accent)"/>

  <text x="80" y="150" font-family="system-ui, sans-serif" font-size="52" font-weight="800" fill="#e2e8f0">The Minimal</text>
  <text x="80" y="215" font-family="system-ui, sans-serif" font-size="52" font-weight="800" fill="#e2e8f0">Runtime Axiom</text>

  <text x="80" y="280" font-family="system-ui, sans-serif" font-size="22" fill="#f97316">d in R(P)  iff  d is omega-dependent</text>

  <text x="80" y="340" font-family="system-ui, sans-serif" font-size="18" fill="#94a3b8">Runtime is not a default -- it is a proof of ignorance.</text>
  <text x="80" y="370" font-family="system-ui, sans-serif" font-size="18" fill="#94a3b8">Every non-omega decision at runtime is a theorem</text>
  <text x="80" y="400" font-family="system-ui, sans-serif" font-size="18" fill="#94a3b8">waiting to be proven.</text>

  <!-- Hierarchy -->
  <rect x="80" y="440" width="140" height="32" rx="16" fill="#22c55e" opacity="0.15"/>
  <text x="150" y="461" font-family="system-ui, sans-serif" font-size="13" fill="#22c55e" text-anchor="middle">proof time</text>

  <text x="232" y="461" font-family="system-ui, sans-serif" font-size="16" fill="#64748b">&lt;-</text>

  <rect x="255" y="440" width="140" height="32" rx="16" fill="#4f8ff7" opacity="0.15"/>
  <text x="325" y="461" font-family="system-ui, sans-serif" font-size="13" fill="#4f8ff7" text-anchor="middle">type-check</text>

  <text x="407" y="461" font-family="system-ui, sans-serif" font-size="16" fill="#64748b">&lt;-</text>

  <rect x="430" y="440" width="140" height="32" rx="16" fill="#7c5cfc" opacity="0.15"/>
  <text x="500" y="461" font-family="system-ui, sans-serif" font-size="13" fill="#7c5cfc" text-anchor="middle">compile-time</text>

  <text x="582" y="461" font-family="system-ui, sans-serif" font-size="16" fill="#64748b">&lt;-</text>

  <rect x="605" y="440" width="120" height="32" rx="16" fill="#f97316" opacity="0.15"/>
  <text x="665" y="461" font-family="system-ui, sans-serif" font-size="13" fill="#f97316" text-anchor="middle">runtime</text>

  <text x="80" y="540" font-family="system-ui, sans-serif" font-size="16" fill="#64748b">YonedaAI Research Collective</text>
  <text x="80" y="565" font-family="system-ui, sans-serif" font-size="14" fill="#475569">Matthew Long -- Chicago, IL</text>

  <rect x="80" y="590" width="1040" height="2" rx="1" fill="url(#accent)" opacity="0.3"/>
